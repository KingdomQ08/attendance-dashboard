<style>
:root{--p:#ff5033;--soft:#fff0ed;--bg:#f5f6f8;--bd:#e5e8ef;--txt:#243047;--mut:#7b8798;--blue:#1677ff;--red:#ff3b30;--green:#16a34a}*{box-sizing:border-box}body{margin:0;min-width:1180px;background:var(--bg);font:14px/1.45 "Microsoft YaHei",Arial,sans-serif;color:var(--txt)}button,input,select{font:inherit}button{cursor:pointer}.top{height:50px;background:linear-gradient(100deg,#f8aa9d,#f8c3b5);color:#fff;display:flex;align-items:center;position:sticky;top:0;z-index:5}.brand{width:180px;padding-left:22px;font-size:18px;font-weight:700}.nav button{width:120px;height:50px;border:0;background:transparent;color:#fff;font-weight:700}.nav .on{background:rgba(255,255,255,.12);box-shadow:inset 0 -4px 0 var(--p)}.user{margin-left:auto;padding-right:24px;font-weight:700}.body{display:flex}.side{width:180px;background:#fff;min-height:calc(100vh - 50px);padding:12px 10px;border-right:1px solid #edf0f5}.side .item,.side .sub{height:40px;border:0;background:transparent;width:100%;text-align:left;border-radius:6px;padding:0 14px}.side .item.on,.side .sub.on{background:var(--soft);font-weight:700}.side .sub{padding-left:48px;color:#58657a}.main{flex:1;min-width:0}.board-tabs{height:40px;background:#fff;border-bottom:1px solid #edf0f5;display:flex;gap:28px;padding:0 16px;align-items:end}.board-tabs button{height:40px;border:0;background:transparent;font-weight:700;color:#4f5f73}.board-tabs .on{color:var(--p);box-shadow:inset 0 -3px 0 var(--p)}.layout{display:flex}.dept{width:180px;background:#fff;border-right:1px solid #edf0f5;padding:12px 10px;height:calc(100vh - 90px);overflow:auto}.dept h3{margin:0 0 10px;font-size:14px;border-left:3px solid var(--p);padding-left:8px}.dept input{width:100%;height:32px;border:1px solid var(--bd);background:#f7f8fa;border-radius:4px;padding:0 10px;margin-bottom:10px}.dept button{width:100%;height:32px;border:0;background:transparent;text-align:left;border-radius:4px;color:#334155}.dept button.on{background:var(--soft);color:var(--p);font-weight:700}.dept em{float:right;color:#8a97aa;font-style:normal}.work{flex:1;min-width:0}.filters{height:48px;background:#fff;border-bottom:1px solid #edf0f5;display:flex;align-items:center;gap:8px;padding:7px 12px}.ctrl{height:34px;border:1px solid #dcdfe6;border-radius:4px;background:#fff;display:flex;align-items:center;gap:8px;padding:0 10px;color:#5f6b7a}.ctrl input,.ctrl select{border:0;outline:0;background:transparent;min-width:70px}.search input{width:110px}.disabled{background:#f5f6f8;color:#a0a8b5}.clear{border:0;border-left:1px solid #dcdfe6;background:#fff;color:#7c8798;padding:0 10px}.tabs{height:43px;background:#fff;border-bottom:1px solid #edf0f5;display:flex;align-items:center;gap:18px;padding:0 16px}.tabs button{height:30px;border:0;background:transparent;border-radius:16px;padding:0 18px;font-weight:700}.tabs .on{background:var(--p);color:#fff}.scroll{height:calc(100vh - 181px);overflow:auto;padding:12px 10px}.notice{display:flex;align-items:center;gap:8px;color:#5c6779;margin-bottom:12px}.notice i{background:#f6c343;color:#fff;border-radius:50%;width:16px;height:16px;text-align:center;font-style:normal;font-size:12px}.panel{background:#fff;border:1px solid var(--bd);border-radius:8px;box-shadow:0 1px 3px rgba(17,24,39,.06);padding:16px;margin-bottom:14px}.head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.head h2{margin:0;font-size:16px}.hint{color:var(--mut);font-size:13px}.metrics{display:grid;grid-template-columns:repeat(7,minmax(120px,1fr));gap:10px}.card{border:1px solid var(--bd);border-radius:6px;background:#fff;text-align:left;padding:14px;min-height:94px}.card:hover{border-color:#ffb0a3}.card span{color:#667085;font-weight:700;font-size:13px}.card strong{display:block;margin-top:8px;font-size:25px;color:#111827}.card em{display:block;margin-top:7px;font-style:normal;color:#8a97aa;font-size:12px}.danger strong{color:var(--red)}.ab-list{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-height:158px;overflow:auto}.ab{border:1px solid #edf0f5;border-radius:7px;background:#fff;min-height:58px;padding:10px;display:grid;grid-template-columns:1fr auto;gap:8px;text-align:left}.ab b{color:var(--blue);margin-right:6px}.ab em{font-style:normal;color:#7b8798;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:inline-block;max-width:270px;vertical-align:bottom}.ab small{display:block;color:#7b8798}.ab i,.ab strong{color:var(--red);font-style:normal}.chart{width:100%;height:330px}.legend{display:flex;gap:24px;margin:4px 0 8px 16px;font-weight:700}.dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:6px}.table-wrap{overflow:auto;background:#fff;border:1px solid var(--bd);border-radius:8px;margin-bottom:14px}table{width:100%;border-collapse:separate;border-spacing:0}th,td{height:42px;padding:8px 14px;border-bottom:1px solid #edf0f5;white-space:nowrap;text-align:left}th{background:#f7f8fa;color:#5b6577;font-weight:700}td{background:#fff}.link{border:0;background:transparent;color:var(--blue);font-weight:700;padding:0}.up{color:#ff1f2f;font-weight:700}.down{color:var(--green);font-weight:700}.rank-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.rank-title{color:var(--p)}.reportbar{display:flex;justify-content:space-between;align-items:center;background:#fff;border:1px solid var(--bd);border-radius:8px;padding:16px;margin-bottom:12px}.subtabs{display:flex;border:1px solid #dfe5ee;border-radius:6px;overflow:hidden}.subtabs button{height:32px;border:0;border-right:1px solid #dfe5ee;background:#fff;padding:0 16px;font-weight:700}.subtabs .on{background:var(--p);color:#fff}.export{height:32px;min-width:86px;border:1px solid #ff8f80;border-radius:4px;background:#fff;color:var(--p);font-weight:700}.month{height:32px;border:1px solid #dfe5ee;border-radius:4px;padding:0 10px;background:#fff}.report{min-width:1550px}.report th,.report td{text-align:center}.sep{border-left:2px solid #d8e1ec}.group{background:#fbfcfe}.drawer-mask{position:fixed;inset:0;background:rgba(17,24,39,.18);z-index:10}.drawer{position:fixed;left:0;right:0;bottom:0;height:390px;background:#fff;border-radius:12px 12px 0 0;box-shadow:0 -8px 24px rgba(17,24,39,.16);z-index:11;display:flex;flex-direction:column}.drawer-head{height:64px;padding:16px 20px;border-bottom:1px solid #edf0f5;display:flex;justify-content:space-between;align-items:center}.drawer h2{font-size:16px;margin:0}.drawer-body{overflow:auto;flex:1;padding:0 16px}.page{height:46px;border-top:1px solid #edf0f5;display:flex;justify-content:flex-end;align-items:center;gap:10px;padding:0 20px;color:#65758b}.tag{display:inline-flex;height:22px;align-items:center;padding:0 8px;border-radius:4px;font-size:12px;font-weight:700}.ok{color:var(--green);background:#edfff2;border:1px solid #b6efc4}.bad{color:var(--red);background:#fff1f0;border:1px solid #ffc2bd}.off{color:#667085;background:#f2f4f7;border:1px solid #d9dee7}.emp{padding:18px 16px}.emp-head{background:#fff;border:1px solid var(--bd);border-radius:6px;padding:16px 24px;margin-bottom:16px;display:flex;align-items:center;gap:14px}.avatar{width:48px;height:48px;border-radius:50%;background:#ffe1e0;color:var(--p);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700}.emp-head h1{margin:0;font-size:18px}.emp-meta{color:#7b8798;font-size:13px}.detail{height:54px;background:#fff;border:1px solid var(--bd);border-radius:8px;display:flex;gap:28px;padding:0 24px;margin-bottom:16px}.detail button{border:0;background:transparent;font-weight:700;color:#5f6b7a}.detail .on{color:var(--p);box-shadow:inset 0 -3px 0 var(--p)}.emp-filter{display:flex;gap:8px;background:#fff;border:1px solid var(--bd);border-radius:8px;padding:10px 12px;margin-bottom:12px}.summary{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}.toast{position:fixed;top:66px;left:50%;transform:translateX(-50%);background:rgba(17,24,39,.86);color:#fff;padding:10px 16px;border-radius:6px;z-index:20}
</style>

<body><div id="app"></div><script>
const employees=[['YK044298','朱方安','P4','公共支持中心','后端开发部','Golang开发','正式','王芳','张大卫'],['YK042587','张卫','T4','公共支持中心','后端开发部','服务端开发','正式','王芳','孙浩'],['YK202603','李娜','P4','市场中心','市场营销部','市场策划','正式','张梅','吴晓'],['YK045440','王建国','M4','产品研发中心','游戏研发部','项目负责人','正式','王芳','李强'],['WB000228','赵阳','W4','产品研发中心','技术研发部','测试支持','人力外包','王芳','孙浩'],['WB000317','吴东','W3','产品研发中心','美术设计部','外包美术','人力外包','王芳','林秀']];
const ab=[['张卫','YK042587','公共支持中心 / 后端开发部','正式',12,7,3,2,1],['李娜','YK202603','市场中心 / 市场营销部','正式',10,5,4,1,0],['王建国','YK045440','产品研发中心 / 游戏研发部','正式',9,6,2,1,0],['陈静','YK202601','市场中心 / 运营支持部','正式',8,4,3,1,1],['赵阳','WB000228','产品研发中心 / 技术研发部','人力外包',7,5,1,1,0],['吴东','WB000317','产品研发中心 / 美术设计部','人力外包',7,3,2,2,0],['朱方安','YK044298','公共支持中心 / 后端开发部','正式',6,2,1,3,0],['小新','WB000136','管理中心 / 人力资源部','人力外包',6,4,1,1,0]];
const trend=[8.9,8.5,9.1,9.3,9.2,9.5,9.7,9.6,9.4,8.8,9.3,9.0],mgr=[9.6,9.2,9.8,9.9,10,10.2,10.4,10.3,10.1,9.5,9.9,9.7],out=[8.2,8,8.3,8.4,8.5,8.6,8.7,8.6,8.4,8.1,8.3,8.2];
let state={tab:'overview',rtype:'dept',scope:'formal',drawer:null,toast:'',emp:null,dept:'全部',months:['202606','202605','202604']};
const $=s=>document.querySelector(s), money=n=>Number(n).toFixed(1).replace('.0',''), up=n=>`<span class="${n>=0?'up':'down'}">${n>=0?'↑':'↓'} ${Math.abs(n).toFixed(1)}%</span>`;
function shell(inner){return `<header class="top"><div class="brand">ⓔ EHR</div><nav class="nav"><button>首页</button><button class="on">人事</button><button>OKR</button><button>绩效</button></nav><div class="user">诸 葛亮1</div></header><div class="body"><aside class="side"><button class="item on">▥ 人事看板</button><button class="sub">人员概览</button><button class="sub on" onclick="goDash()">考勤看板</button><button class="sub">组织视图</button><button class="item ${state.emp?'on':''}">♙ 人事管理</button><button class="sub ${state.emp?'on':''}" onclick="goEmp('YK044298')">在职员工</button><button class="sub">离职员工</button><button class="sub">试用期管理</button><button class="item">⌘ 组织管理</button></aside><main class="main">${inner}</main></div>${state.drawer?drawer():''}${state.toast?`<div class="toast">${state.toast}</div>`:''}`}
function dash(){return shell(`<div class="layout"><aside class="dept"><h3>管理部门</h3><input placeholder="搜索部门"><button class="on" onclick="dept('全部')">全部 <em>2651人</em></button>${['产品事业部','产品研发中心','后端开发部','技术研发部','游戏研发部','美术设计部','商业化事业部','市场营销部','运营支持部','职能中心','公共支持中心'].map((d,i)=>`<button onclick="dept('${d}')">${i%3?'　':''}${d}<em>${[63,22,7,8,32,25,41,18,10,28,29][i]}人</em></button>`).join('')}</aside><div class="work">${topTabs()}${filters()}<div class="scroll"><div class="notice"><i>!</i>考勤数据仅统计正式员工和人力外包；不含实习生、顾问、兼职、客服部、游戏运营部、司机岗、境外/非中国大陆工作地及无需打卡人员。法定节假日不纳入考勤分析。</div>${state.tab==='overview'?overview():report()}</div></div></div>`)}
function topTabs(){return `<nav class="board-tabs"><button>人员概览</button><button class="on">考勤看板</button><button>组织视图</button></nav>`}
function filters(){let lock=state.tab==='formal'?'正式':state.tab==='out'?'人力外包':'全部';return `<section class="filters"><label class="ctrl search">⌕ <input placeholder="姓名 / 工号"></label><label class="ctrl ${state.tab==='overview'?'':'disabled'}">用工性质 <select ${state.tab==='overview'?'':'disabled'}><option>${lock}</option></select></label><label class="ctrl">职级 <select><option>全部</option><option>P4</option><option>M3</option></select></label><label class="ctrl">岗位 <select><option>全部</option></select></label><label class="ctrl">工作地点 <select><option>全部</option></select></label><label class="ctrl">统计口径 <select><option>标准口径</option><option>全口径</option></select> ?</label><button class="clear">▱ 清空</button></section><nav class="tabs"><button class="${state.tab==='overview'?'on':''}" onclick="tab('overview')">考勤概览</button><button class="${state.tab==='formal'?'on':''}" onclick="tab('formal')">考勤报表（正式）</button><button class="${state.tab==='out'?'on':''}" onclick="tab('out')">考勤报表（人力外包）</button></nav>`}
function overview(){return `${metrics()}${abnormal()}${chart()}${trendTable()}${ranks()}`}
function metrics(){let cards=[['在职人数','2,148','当前筛选范围'],['应打卡人数','2,031','剔除特殊休假'],['实际打卡人数','1,889','有效上下班打卡'],['打卡覆盖率','93.0%','实际 / 应打卡'],['考勤异常人数','142','迟到/早退/漏打卡','danger'],['考勤异常率','6.6%','异常人数 / 应打卡','danger'],['平均工时','8.74h','不含午休1h']];return `<section class="panel"><div class="head"><div><h2>考勤指标</h2><div class="hint">点击卡片查看员工明细</div></div><label class="ctrl">统计日 <input value="2026/06/30"></label></div><div class="metrics">${cards.map(c=>`<button class="card ${c[3]||''}" onclick="openDrawer('${c[0]}明细')"><span>${c[0]}${c[3]?' ⚠':''}</span><strong>${c[1]}</strong><em>${c[2]}</em></button>`).join('')}</div></section>`}
function abnormal(){return `<section class="panel"><div class="head"><h2>员工异常关注（8人）</h2><div><label class="ctrl">考勤月 <select><option>202606</option></select></label> <span style="color:var(--p);border:1px solid #ffc0b8;padding:6px 10px;border-radius:4px">阈值 ≥ 6次</span></div></div><div class="ab-list">${ab.map(a=>`<button class="ab" onclick="goEmp('${a[1]}')"><span><b>${a[0]}</b><em>${a[1]} · ${a[2]} · ${a[3]}</em><small>迟到 <i>${a[5]}</i>　早退 <i>${a[6]}</i>　漏卡 <i>${a[7]}</i>　旷工 <i>${a[8]}</i></small></span><strong>${a[4]}<small>次</small></strong></button>`).join('')}</div></section>`}
function chart(){let pts=(arr,color)=>arr.map((v,i)=>`${50+i*88},${300-(v-7)*62}`).join(' ');return `<section class="panel"><div class="head"><div><h2>月平均工时趋势</h2><div class="hint">点击节点拉起员工月度明细。</div></div><label class="ctrl">月份范围 <select><option>2026年 1月 - 12月</option></select></label></div><div class="legend"><span><i class="dot" style="background:#5ea2ff"></i>负责人</span><span><i class="dot" style="background:#ff6363"></i>员工</span><span><i class="dot" style="background:#8b6cff"></i>人力外包</span></div><svg class="chart" viewBox="0 0 1080 330" preserveAspectRatio="none"><defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#5ea2ff" stop-opacity=".2"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></linearGradient></defs>${[7,8,9,10].map(y=>`<line x1="50" x2="1020" y1="${300-(y-7)*62}" y2="${300-(y-7)*62}" stroke="#eaf0f7" stroke-dasharray="3 5"/><text x="20" y="${305-(y-7)*62}" fill="#7890ad">${y}h</text>`).join('')}<polyline points="50,300 ${pts(mgr)} 1020,300" fill="url(#g)"/><polyline points="${pts(mgr)}" fill="none" stroke="#5ea2ff" stroke-width="3"/><polyline points="${pts(trend)}" fill="none" stroke="#ff6363" stroke-width="3"/><polyline points="${pts(out)}" fill="none" stroke="#8b6cff" stroke-width="3"/>${trend.map((v,i)=>`<circle cx="${50+i*88}" cy="${300-(v-7)*62}" r="5" fill="#fff" stroke="#ff6363" stroke-width="3" onclick="openDrawer('${i+1}月 员工月度工时明细')"/>`).join('')}${trend.map((_,i)=>`<text x="${45+i*88}" y="324" fill="#7890ad">${i+1}月</text>`).join('')}</svg></section>`}
function trendTable(){return `<div class="table-wrap"><table><thead><tr><th>考勤周期</th><th colspan="3">员工</th><th colspan="3">负责人</th><th colspan="3">人力外包</th></tr><tr><th></th><th>月平均工时</th><th>同比上一年</th><th>环比上个月</th><th>月平均工时</th><th>同比上一年</th><th>环比上个月</th><th>月平均工时</th><th>同比上一年</th><th>环比上个月</th></tr></thead><tbody>${trend.map((v,i)=>`<tr><td>${i+1}月</td><td>${v}</td><td>--</td><td>${up(i%3?-1.1:2.1)}</td><td>${mgr[i]}</td><td>--</td><td>${up(i%2?2:-1)}</td><td>${out[i]}</td><td>--</td><td>${up(i%2?-1.2:1.2)}</td></tr>`).join('')}<tr><td><b>月均</b></td><td><b>9.24</b></td><td>--</td><td>--</td><td><b>9.94</b></td><td>--</td><td>--</td><td><b>8.41</b></td><td>--</td><td>--</td></tr></tbody></table></div>`}
function ranks(){let rows=['后端开发部','海外运营部','游戏研发部','前端开发部','产品规划部','测试质量部','市场公关部','美术设计部','数据分析部','公共支持中心'];let card=(title,low)=>`<section class="panel"><div class="head"><div><h2>部门平均工时排名 · <span class="rank-title">${low?'后10名':'前10名'}</span></h2><div class="hint">点击部门同步筛选</div></div><label class="ctrl">考勤月 <select><option>202606</option></select></label></div><table><thead><tr><th>排名</th><th>部门</th><th>部门人数</th><th>负责人</th><th>HRBP</th><th>平均工时</th></tr></thead><tbody>${rows.map((r,i)=>`<tr><td>${i+1}</td><td><button class="link" onclick="dept('${r}')">${r}</button></td><td>${[45,28,32,38,22,30,18,25,15,50][i]}</td><td><button class="link" onclick="openDrawer('负责人关联员工明细')">${['张大卫','李强','王建国','周涛','林秀','何冰','陈晨','吴东','黄磊','王芳'][i]}</button></td><td>王芳</td><td><b>${low?money(7.2+i*.16):money(10.2-i*.2)}h</b></td></tr>`).join('')}</tbody></table></section>`;return `<section class="rank-grid">${card('部门',0)}${card('部门',1)}${card('负责人',0).replaceAll('部门平均工时排名','负责人平均工时排名').replace('点击部门同步筛选','点击负责人打开员工明细')}${card('负责人',1).replaceAll('部门平均工时排名','负责人平均工时排名').replace('点击部门同步筛选','点击负责人打开员工明细')}</section>`}
function report(){let scope=state.tab==='out'?'人力外包':'正式';return `<section class="reportbar"><div class="subtabs">${['部门考勤报表','负责人考勤报表','员工考勤报表','外出数据报表'].map((n,i)=>`<button class="${i===0?'on':''}">${n}</button>`).join('')}</div><div><button class="month">考勤月　2026-06、2026-05、2026-04⌄</button> <button class="export" onclick="toast('已模拟导出')">导出</button></div></section><section class="panel" style="padding:0;overflow:hidden"><div class="table-wrap" style="border:0;margin:0"><table class="report"><thead><tr><th rowspan="3">事业部</th><th rowspan="3">中心/工作室</th><th rowspan="3">部门</th><th rowspan="3">负责人</th><th rowspan="3">HRBP</th>${['2026-06','2026-05','2026-04'].map(m=>`<th colspan="8" class="sep">${m}</th>`).join('')}</tr><tr>${[1,2,3].map(()=>`<th colspan="4" class="group sep">公司平均工时 8.92h</th><th colspan="4" class="group">公司异常均值 3</th>`).join('')}</tr><tr>${[1,2,3].map(()=>`<th class="sep">部门总人数</th><th>部门平均工时</th><th>部门同上月环比</th><th>部门排名</th><th>部门平均人次</th><th>异常同上月环比</th><th>异常排名</th><th>备注</th>`).join('')}</tr></thead><tbody>${['后端开发部','海外运营部','游戏研发部','前端开发部','产品规划部','测试质量部'].map((d,i)=>`<tr><td>产品事业部</td><td>产品研发中心</td><td><button class="link">${d}</button></td><td>张大卫</td><td>王芳</td>${[1,2,3].map((_,m)=>`<td class="sep">${40-i*3}</td><td><b>${money(9.21-i*.08-m*.06)}h</b></td><td>${up(.3+i*.3-m*.4)}</td><td>${i+1+m}</td><td class="danger">${money(3.2-i*.25+m*.2)}</td><td>${up(8.6+i-m*2)}</td><td>${7+i}</td><td class="hint">点击编辑...</td>`).join('')}</tr>`).join('')}</tbody></table></div></section>`}
function empPage(id){let e=employees.find(x=>x[0]===id)||employees[0];let rec=[['2026-06-15（一）','工作日','09:58','20:30','9.5h','正常','--','-'],['2026-06-14（日）','休息日','--','--','--','休息日','--','-'],['2026-06-12（五）','工作日','10:15','21:00','9.7h','迟到','迟到','忘带手机'],['2026-06-11（四）','工作日','09:31','--','--','漏打卡','漏打卡','下班漏卡'],['2026-06-10（三）','工作日','09:22','19:05','8.7h','正常','--','-']];return shell(`<div class="emp"><section class="emp-head"><div class="avatar">${e[1][0]}</div><div><h1>${e[1]} <span class="tag ok">在职</span></h1><div class="emp-meta">${e[6]} ｜ ${e[2]} ｜ ${e[3]} - ${e[4]}</div></div></section><nav class="detail">${['基础信息','合同记录','异动记录','历史绩效','考勤记录','奖惩记录','盘点记录','回流记录'].map(t=>`<button class="${t==='考勤记录'?'on':''}">${t}</button>`).join('')}</nav><section class="emp-filter"><label class="ctrl">考勤月 <select><option>202606</option></select></label><label class="ctrl">日期范围 <input value="2026/05/16"> - <input value="2026/06/15"></label><label class="ctrl">异常类型 <select><option>全部</option><option>迟到</option><option>漏打卡</option></select></label><label class="ctrl">统计口径 <select><option>全口径</option></select></label><button class="clear">▱ 清空</button></section><section class="summary">${[['平均工时','10.2h'],['考勤异常次数','2次'],['请假天数','0.5天'],['外出天数','0天'],['加班时长','12.5h']].map(c=>`<button class="card"><span>${c[0]}</span><strong>${c[1]}</strong></button>`).join('')}</section><section class="panel"><div class="head"><h2 style="border-left:3px solid var(--p);padding-left:8px">考勤明细</h2></div><table><thead><tr><th>日期</th><th>日期类型</th><th>上班打卡</th><th>下班打卡</th><th>工作时长 ?</th><th>打卡结果</th><th>异常类型</th><th>备注</th></tr></thead><tbody>${rec.map(r=>`<tr>${r.map((c,i)=>`<td>${i===5?tag(c):c}</td>`).join('')}</tr>`).join('')}</tbody></table><div class="page">共 5 条　30 条/页 <button disabled>上一页</button><b style="color:var(--p)">1</b><button disabled>下一页</button></div></section></div>`)}
function tag(s){return `<span class="tag ${s==='正常'?'ok':s==='休息日'?'off':'bad'}">${s}</span>`}function drawer(){let rows=employees.concat(employees).map(e=>`<tr><td>${e[0]}</td><td><button class="link" onclick="goEmp('${e[0]}')">${e[1]}</button></td><td>${e[3]} / ${e[4]}</td><td>${e[8]}</td><td>${e[7]}</td><td>${e[5]}</td><td>${e[2]}</td><td>${e[6]}</td><td>2026-06-30</td><td>09:28</td><td>20:30</td><td>${tag(Math.random()>.7?'迟到':'正常')}</td><td>8.8h</td><td>当前筛选范围</td></tr>`).join('');return `<div class="drawer-mask" onclick="closeD()"></div><aside class="drawer"><div class="drawer-head"><h2>${state.drawer}</h2><div><button class="export" onclick="toast('已模拟导出')">导出</button> <button class="clear" onclick="closeD()">×</button></div></div><div class="drawer-body"><table><thead><tr><th>工号</th><th>姓名</th><th>中心/部门</th><th>负责人</th><th>HRBP</th><th>岗位子科目</th><th>专业职级</th><th>用工性质</th><th>打卡日期</th><th>上班打卡</th><th>下班打卡</th><th>打卡结果</th><th>工作时长</th><th>备注</th></tr></thead><tbody>${rows}</tbody></table></div><div class="page">共 12 条　每页 <select><option>10</option><option>20</option><option>30</option><option>50</option><option>100</option></select> 条 <button disabled>上一页</button><b style="color:var(--p)">1</b><button>下一页</button></div></aside>`}
function tab(t){state.tab=t;render()}function dept(d){state.dept=d;toast('已筛选：'+d)}function openDrawer(t){state.drawer=t;render()}function closeD(){state.drawer=null;render()}function goEmp(id){state.emp=id;location.hash='#/employee/'+id+'/attendance';render()}function goDash(){state.emp=null;state.tab='overview';location.hash='#/attendance/overview';render()}function toast(t){state.toast=t;render();setTimeout(()=>{state.toast='';render()},1600)}function render(){document.getElementById('app').innerHTML=state.emp?empPage(state.emp):dash()}window.onhashchange=()=>{if(location.hash.startsWith('#/employee/'))state.emp=location.hash.split('/')[2];else state.emp=null;render()};if(location.hash.startsWith('#/employee/'))state.emp=location.hash.split('/')[2];render();
</script></body></html>
